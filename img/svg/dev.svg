<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 650" version="1.1" id="dev-svg">
  <g stroke="#1A1A1A" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g id="dev-all" fill-rule="nonzero">
      <!-- Desktop monitor left -->
      <g transform="translate(60,80)">
        <rect x="0" y="0" width="200" height="140" rx="8" fill="#FFFFFF" stroke-width="3"/>
        <rect x="12" y="12" width="176" height="110" rx="4" fill="#1A1A1A" stroke-width="2"/>
        <!-- Code lines on screen -->
        <rect x="20" y="20" width="30" height="6" rx="2" fill="#8f4f23" stroke="none"/>
        <rect x="20" y="32" width="80" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.7"/>
        <rect x="20" y="42" width="60" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.5"/>
        <rect x="20" y="52" width="120" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.6"/>
        <rect x="20" y="62" width="90" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.4"/>
        <rect x="20" y="72" width="140" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.5"/>
        <rect x="20" y="82" width="70" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.3"/>
        <rect x="20" y="92" width="110" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.5"/>
        <rect x="20" y="102" width="50" height="4" rx="1" fill="#8f4f23" stroke="none" opacity="0.3"/>
        <!-- Stand -->
        <path d="M80,140 L120,140 L110,152 L90,152 Z" fill="#FFFFFF" stroke-width="2.5"/>
        <rect x="60" y="152" width="80" height="6" rx="3" fill="#FFFFFF" stroke-width="2.5"/>
      </g>

      <!-- Laptop right -->
      <g transform="translate(340,60)">
        <rect x="0" y="0" width="190" height="120" rx="6" fill="#FFFFFF" stroke-width="3"/>
        <rect x="10" y="10" width="170" height="95" rx="3" fill="#1A1A1A" stroke-width="2"/>
        <!-- Website preview on laptop -->
        <rect x="16" y="16" width="158" height="12" rx="2" fill="#8f4f23" stroke="none"/>
        <rect x="16" y="34" width="50" height="30" rx="2" fill="#FFFFFF" stroke-width="1.5"/>
        <rect x="72" y="34" width="102" height="30" rx="2" fill="#FFFFFF" stroke-width="1.5"/>
        <rect x="16" y="70" width="158" height="6" rx="1" fill="#8f4f23" stroke="none" opacity="0.4"/>
        <rect x="16" y="80" width="100" height="6" rx="1" fill="#8f4f23" stroke="none" opacity="0.3"/>
        <rect x="22" y="40" width="38" height="18" rx="1" fill="#8f4f23" stroke="none" opacity="0.3"/>
        <rect x="78" y="40" width="90" height="8" rx="1" fill="#8f4f23" stroke="none" opacity="0.4"/>
        <rect x="78" y="52" width="60" height="6" rx="1" fill="#8f4f23" stroke="none" opacity="0.2"/>
        <path d="M50,120 L140,120 L130,128 L60,128 Z" fill="#FFFFFF" stroke-width="2"/>
      </g>

      <!-- Code brackets decor -->
      <g transform="translate(295,130)" stroke-width="2.5" opacity="0.4">
        <text font-family="monospace" font-size="22" fill="#1A1A1A" stroke="none">&lt;/&gt;</text>
      </g>

      <!-- Server rack bottom -->
      <g transform="translate(80,270)">
        <rect x="0" y="0" width="180" height="200" rx="8" fill="#FFFFFF" stroke-width="3"/>
        <rect x="10" y="10" width="160" height="40" rx="3" fill="#1A1A1A" stroke-width="2"/>
        <rect x="10" y="58" width="160" height="40" rx="3" fill="#8f4f23" stroke-width="2"/>
        <rect x="10" y="106" width="160" height="40" rx="3" fill="#1A1A1A" stroke-width="2"/>
        <rect x="10" y="154" width="160" height="40" rx="3" fill="#FFFFFF" stroke-width="2"/>
        <circle cx="25" cy="30" r="4" fill="#FFFFFF" stroke="none"/>
        <circle cx="40" cy="30" r="4" fill="#8f4f23" stroke="none"/>
        <circle cx="25" cy="78" r="4" fill="#FFFFFF" stroke="none"/>
        <circle cx="40" cy="78" r="4" fill="#8f4f23" stroke="none"/>
        <circle cx="25" cy="126" r="4" fill="#FFFFFF" stroke="none"/>
        <circle cx="40" cy="126" r="4" fill="#8f4f23" stroke="none"/>
        <rect x="120" y="164" width="40" height="20" rx="2" fill="#8f4f23" stroke="none"/>
      </g>

      <!-- Database cylinder -->
      <g transform="translate(330,310)">
        <ellipse cx="50" cy="0" rx="50" ry="14" fill="#8f4f23" stroke-width="2.5"/>
        <path d="M0,0 L0,50 C0,62 22,72 50,72 C78,72 100,62 100,50 L100,0" fill="#FFFFFF" stroke-width="2.5"/>
        <ellipse cx="50" cy="50" rx="50" ry="14" fill="none" stroke-width="2.5"/>
        <path d="M8,16 C8,27 27,36 50,36 C73,36 92,27 92,16" fill="none" stroke-width="1.5" stroke-dasharray="4,4"/>
        <path d="M4,34 C4,45 25,54 50,54 C75,54 96,45 96,34" fill="none" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
      </g>

      <!-- Connection arrows -->
      <path d="M260,210 C280,250 310,280 330,310" stroke-width="2" stroke-dasharray="5,4" opacity="0.4"/>
      <path d="M260,240 C270,270 290,290 310,320" stroke-width="2" stroke-dasharray="5,4" opacity="0.4"/>

      <!-- Gear/process icon -->
      <g transform="translate(460,200)">
        <circle cx="0" cy="0" r="20" fill="#8f4f23" stroke-width="2.5"/>
        <path d="M-3,-20 L-3,-14 M3,-20 L3,-14 M-3,14 L-3,20 M3,14 L3,20 M-20,-3 L-14,-3 M-20,3 L-14,3 M14,-3 L20,-3 M14,3 L20,3" stroke-width="3" fill="none"/>
        <circle cx="0" cy="0" r="8" fill="#FFFFFF" stroke-width="2"/>
      </g>

      <!-- Responsive devices icons -->
      <g transform="translate(460,300)">
        <rect x="0" y="20" width="30" height="50" rx="4" fill="#FFFFFF" stroke-width="2"/>
        <rect x="4" y="24" width="22" height="38" rx="2" fill="#1A1A1A" stroke="none"/>
        <rect x="10" y="58" width="10" height="3" rx="1" fill="#FFFFFF" stroke="none"/>
      </g>
      <g transform="translate(500,290)">
        <rect x="0" y="10" width="45" height="35" rx="3" fill="#FFFFFF" stroke-width="2"/>
        <rect x="3" y="13" width="39" height="28" rx="1" fill="#1A1A1A" stroke="none"/>
        <rect x="15" y="45" width="15" height="3" rx="1" fill="#FFFFFF" stroke="none"/>
      </g>

      <!-- Decorative -->
      <circle cx="30" cy="30" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>
      <circle cx="570" cy="30" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>
      <circle cx="30" cy="620" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>
      <circle cx="570" cy="620" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>
      <line x1="30" y1="15" x2="570" y2="15" stroke-width="1" stroke-dasharray="6,8" opacity="0.2"/>

      <!-- Color palette / pencil decor -->
      <g transform="translate(450,430)">
        <rect x="0" y="0" width="12" height="80" rx="2" fill="#FFFFFF" stroke-width="2"/>
        <polygon points="-2,0 14,0 6,-18" fill="#8f4f23" stroke-width="2"/>
        <path d="M6,-18 L6,-24" stroke-width="2.5" fill="none"/>
        <line x1="0" y1="20" x2="12" y2="20" stroke-width="1.5" fill="none" opacity="0.5"/>
        <line x1="0" y1="35" x2="12" y2="35" stroke-width="1.5" fill="none" opacity="0.4"/>
        <line x1="0" y1="50" x2="12" y2="50" stroke-width="1.5" fill="none" opacity="0.3"/>
        <line x1="0" y1="65" x2="8" y2="65" stroke-width="1.5" fill="none" opacity="0.2"/>
      </g>

      <!-- Dots at bottom -->
      <circle cx="180" cy="560" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>
      <circle cx="210" cy="565" r="3" fill="#1A1A1A" stroke="none" opacity="0.25"/>
      <circle cx="240" cy="560" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>
      <circle cx="350" cy="560" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>
      <circle cx="380" cy="565" r="3" fill="#1A1A1A" stroke="none" opacity="0.25"/>
      <circle cx="410" cy="560" r="3" fill="#1A1A1A" stroke="none" opacity="0.3"/>

    </g>
  </g>
</svg>
